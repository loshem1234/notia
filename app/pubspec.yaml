name: notia
description: A frictionless, self-organizing idea capture system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # HTTP
  http: ^1.2.2
  
  # Speech Recognition
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  
  # Home Screen Widget
  home_widget: ^0.6.0
  
  # Date/Time
  intl: ^0.19.0
  
  # UI
  flutter_slidable: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # Uncomment to add assets
  # assets:
  #   - assets/
